# Spring AI Configuration for LLM Integration
# Reference: SpringAI.pdf from HW3
# Load optional .env file from backend root
spring.config.import=optional:file:.env[.properties]

# OpenAI API Configuration
# IMPORTANT: Set your actual API key via environment variable SPRING_AI_OPENAI_API_KEY
# Never hardcode secrets in this file.
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}

# OpenAI Chat Model Settings
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1000

# Logging - WARN level for clean CLI output (hides debug spam)
logging.level.root=WARN
logging.level.com.northeastern=WARN
logging.level.com.northeastern.csye7374.finalproject=WARN
logging.level.akka=WARN
logging.level.akka.cluster=WARN
logging.level.org.springframework=WARN
logging.level.io.netty=WARN
logging.level.io.grpc=WARN
logging.level.org.nd4j=ERROR
logging.level.org.deeplearning4j=ERROR

# Disable FreeMarker autoconfiguration (REST-only backend)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.freemarker.FreeMarkerAutoConfiguration

# Application Settings
app.name=Distributed RAG System
app.version=1.0.0

# Qdrant Configuration (for reference)
qdrant.host=localhost
qdrant.port=6334
qdrant.collection=course_documents