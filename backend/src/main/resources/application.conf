# Akka Cluster Configuration for Distributed RAG System
# Reference: Akka_Cluster.pdf
# 
# CSYE 7374 - Advanced Design Patterns
# Team: Roshan Shetty & Rithwik

akka {
  # Actor provider - MUST be "cluster" for Akka Cluster
  actor {
    provider = "cluster"
    
    # Allow Java serialization for cluster messages
    # (Avoids Jackson version conflicts between Akka and Spring AI)
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
    
    # Serialization for cluster messages - using Java serialization
    # All messages sent between nodes MUST be listed here!
    serialization-bindings {
      # ═══════════════════════════════════════════════════════════════
      # Message classes (in messages/ package)
      # ═══════════════════════════════════════════════════════════════
      "com.northeastern.csye7374.finalproject.messages.SearchQuery" = java
      "com.northeastern.csye7374.finalproject.messages.SearchResponse" = java
      "com.northeastern.csye7374.finalproject.messages.LLMRequest" = java
      "com.northeastern.csye7374.finalproject.messages.LLMResponse" = java
      
      # ═══════════════════════════════════════════════════════════════
      # SearchWorkerActor commands (nested classes use $ notation)
      # ═══════════════════════════════════════════════════════════════
      "com.northeastern.csye7374.finalproject.actors.SearchWorkerActor$Command" = java
      "com.northeastern.csye7374.finalproject.actors.SearchWorkerActor$SearchCommand" = java
      
      # ═══════════════════════════════════════════════════════════════
      # OrchestratorActor commands and responses
      # ═══════════════════════════════════════════════════════════════
      "com.northeastern.csye7374.finalproject.actors.OrchestratorActor$Command" = java
      "com.northeastern.csye7374.finalproject.actors.OrchestratorActor$ProcessQuery" = java
      "com.northeastern.csye7374.finalproject.actors.OrchestratorActor$QueryResult" = java
      
      # ═══════════════════════════════════════════════════════════════
      # LLMActor commands and responses (NEW!)
      # ═══════════════════════════════════════════════════════════════
      "com.northeastern.csye7374.finalproject.actors.LLMActor$Command" = java
      "com.northeastern.csye7374.finalproject.actors.LLMActor$GenerateAnswer" = java
      "com.northeastern.csye7374.finalproject.actors.LLMActor$LLMResponse" = java
      
      # ═══════════════════════════════════════════════════════════════
      # LoggingActor commands (NEW!)
      # TELL pattern (fire-and-forget) - no response classes needed
      # ═══════════════════════════════════════════════════════════════
      "com.northeastern.csye7374.finalproject.actors.LoggingActor$Command" = java
      "com.northeastern.csye7374.finalproject.actors.LoggingActor$LogQuery" = java
      "com.northeastern.csye7374.finalproject.actors.LoggingActor$LogSearch" = java
      "com.northeastern.csye7374.finalproject.actors.LoggingActor$LogEntry" = java
      
      # ═══════════════════════════════════════════════════════════════
      # ClusterClientActor commands (REST API gateway)
      # Used by Spring Boot to communicate with cluster
      # ═══════════════════════════════════════════════════════════════
      "com.northeastern.csye7374.finalproject.actors.ClusterClientActor$Command" = java
      "com.northeastern.csye7374.finalproject.actors.ClusterClientActor$GetOrchestrator" = java
      "com.northeastern.csye7374.finalproject.actors.ClusterClientActor$OrchestratorResponse" = java
    }
    
    # Debug logging for actors
    debug {
      receive = off        # Log all messages received by actors
      autoreceive = off    # Log all special messages (Kill, PoisonPill, etc.)
      lifecycle = on       # Log actor lifecycle events (start, stop, restart)
      unhandled = on       # Log unhandled messages
    }
  }
  
  # Remoting configuration (Artery for Akka Typed)
  remote {
    artery {
      canonical {
        hostname = "127.0.0.1"  # localhost for development
        port = 2551              # Default port (override via -Dakka.remote.artery.canonical.port)
      }
    }
  }
  
  # Cluster configuration
  cluster {
    # Seed nodes - first contact points for cluster formation
    # All nodes will try to join via these seed nodes
    seed-nodes = [
      "akka://DistributedRAGSystem@127.0.0.1:2551",  # Seed node 1
      "akka://DistributedRAGSystem@127.0.0.1:2552"   # Seed node 2
    ]
    
    # Roles for this node (optional - can be used for specialized nodes)
    # roles = ["worker", "coordinator"]
    
    # Auto-down unreachable nodes after 10 seconds
    # WARNING: In production, use akka-split-brain-resolver instead
    auto-down-unreachable-after = 10s
    
    # Minimum number of members before cluster is considered Up
    # Set to 1 to allow single-node startup for testing
    min-nr-of-members = 1
    
    # Failure detector settings
    failure-detector {
      threshold = 12.0
      acceptable-heartbeat-pause = 5s
      heartbeat-interval = 1s
    }
  }
  
  # Logging - INFO level for demo (shows actor lifecycle and patterns)
  # Change to ERROR for clean CLI output
  loglevel = "INFO"
  stdout-loglevel = "INFO"
  
  # Log configuration on startup
  log-config-on-start = off
  
  # Coordinated shutdown (graceful shutdown)
  coordinated-shutdown {
    exit-jvm = on
  }
}

# ═══════════════════════════════════════════════════════════════════════════════
# ARCHITECTURE SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════
#
# Actors per Node:
#   - 1x OrchestratorActor (coordinates RAG pipeline)
#   - 4x SearchWorkerActor (vector search workers)
#   - 1x LLMActor (LLM communication wrapper)
#   - 1x LoggingActor (centralized logging)
#
# Communication Patterns Demonstrated:
#
#   1. TELL (fire-and-forget):
#      - OrchestratorActor → LoggingActor
#      - LLMActor → LoggingActor
#      - LoggingActor NEVER replies
#
#   2. ASK (request-response):
#      - REST/CLI → OrchestratorActor (via AskPattern/messageAdapter)
#      - Uses CompletionStage for async response
#
#   3. FORWARD (preserve original sender):
#      - OrchestratorActor → LLMActor
#      - replyTo is passed along so LLMActor can respond to original sender
#      - Demonstrates how to maintain response chain across actors
#
# Message Flow:
#   REST POST /api/ask
#     ↓ ASK
#   OrchestratorActor.ProcessQuery
#     ↓ TELL (to LoggingActor, fire-and-forget)
#     ↓ TELL (to SearchWorkerActor)
#   SearchWorkerActor (vector search)
#     ↓ response via adapter
#   OrchestratorActor.SearchCompleted
#     ↓ TELL (to LoggingActor, fire-and-forget)
#     ↓ FORWARD (to LLMActor, replyTo preserved)
#   LLMActor.GenerateAnswer
#     ↓ TELL (to LoggingActor, fire-and-forget)
#     ↓ response to replyTo (FORWARD chain)
#   OrchestratorActor.LLMCompleted
#     ↓ response to original sender
#   REST response
#
# ═══════════════════════════════════════════════════════════════════════════════
